---
- name: Validate the RKE2 kubeconfig export topology
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Require at least one RKE2 server node
      ansible.builtin.assert:
        that:
          - groups.get('server', []) | length > 0
        fail_msg: "The RKE2 inventory must contain at least one host in the 'server' group."

    - name: Require exactly one RKE2 load balancer node
      ansible.builtin.assert:
        that:
          - groups.get('haproxy', []) | length == 1
        fail_msg: "The RKE2 inventory must contain exactly one host in the 'haproxy' group."

- name: Read the RKE2 kubeconfig from the bootstrap server
  hosts: "{{ groups['server'] | sort | first }}"
  gather_facts: false
  tasks:
    - name: Export the bootstrap server kubeconfig into memory
      ansible.builtin.include_role:
        name: rke2_cluster
        tasks_from: export_kubeconfig

- name: Write the workstation kubeconfig and update /etc/hosts
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    rke2_bootstrap_host: "{{ groups['server'] | sort | first }}"
    rke2_lb_host: "{{ groups['haproxy'] | sort | first }}"
    rke2_lb_ip: "{{ hostvars[rke2_lb_host].ansible_host }}"
    rke2_api_hostname: "{{ hostvars[rke2_bootstrap_host].homelab_api_hostname }}"
    rke2_remote_kubeconfig: "{{ hostvars[rke2_bootstrap_host].rke2_exported_kubeconfig }}"
  tasks:
    - name: Require an RKE2 API hostname
      ansible.builtin.assert:
        that:
          - rke2_api_hostname | length > 0
        fail_msg: "No api_hostname was resolved for the RKE2 environment."

    - name: Install the workstation kubeconfig and hosts entry
      ansible.builtin.include_role:
        name: rke2_kubeconfig
