apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-ingress-demo
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-ingress-demo
  template:
    metadata:
      labels:
        app: nginx-ingress-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress-demo
  namespace: demo
spec:
  selector:
    app: nginx-ingress-demo
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-ingress-demo
  namespace: demo
spec:
  ingressClassName: nginx
  rules:
    - host: nginx-ingress-demo.rke2.home.arpa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-ingress-demo
                port:
                  number: 80
